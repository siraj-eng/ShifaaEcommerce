<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shifaa Herbal | Admin Portal</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: #f5f5f5;
            overflow-x: hidden;
        }
        
        .auth-container {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            min-height: 100vh;
        }
        
        /* Illustration Side - Image Only */
        .auth-illustration {
            position: relative;
            overflow: hidden;
        }
        
        /* Fancy Partition Effect */
        .auth-illustration::after {
            content: '';
            position: absolute;
            top: 0;
            right: -50px;
            width: 100px;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transform: skewX(-10deg);
            pointer-events: none;
            z-index: 2;
        }
        
        .illustration-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }
        
        /* Form Side */
        .auth-form {
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 4rem;
            background: #ffffff;
            position: relative;
        }
        
        /* Fancy Partition Effect for Form Side */
        .auth-form::before {
            content: '';
            position: absolute;
            top: 0;
            left: -50px;
            width: 100px;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(46, 125, 50, 0.05), transparent);
            transform: skewX(-10deg);
            pointer-events: none;
        }
        
        .auth-form-container {
            max-width: 420px;
            width: 100%;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }
        
        /* Logo Section */
        .auth-form-logo {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 2rem;
        }
        
        .logo-image {
            width: 100px;
            height: 100px;
            object-fit: contain;
            margin-bottom: 1rem;
        }
        
        .logo-text {
            font-size: 1.5rem;
            font-weight: 700;
            color: #2e7d32;
            text-align: center;
        }
        
        /* Admin Badge */
        .admin-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            background: #f3f4f6;
            padding: 0.5rem 1rem;
            border-radius: 50px;
            margin-bottom: 2rem;
            font-size: 0.85rem;
            font-weight: 500;
            color: #2e7d32;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
        }
        
        .admin-badge i {
            font-size: 1rem;
        }
        
        /* Form Styles */
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: #374151;
            font-size: 0.875rem;
        }
        
        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        
        .input-wrapper i {
            position: absolute;
            left: 1rem;
            color: #9ca3af;
            font-size: 1rem;
            z-index: 1;
        }
        
        .form-control {
            width: 100%;
            padding: 0.875rem 3rem 0.875rem 2.75rem;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            font-size: 0.9rem;
            transition: all 0.2s ease;
            font-family: 'Poppins', sans-serif;
        }
        
        .form-control:focus {
            outline: none;
            border-color: #2e7d32;
            box-shadow: 0 0 0 3px rgba(46, 125, 50, 0.1);
        }
        
        .password-toggle {
            position: absolute;
            right: 1rem;
            background: none;
            border: none;
            color: #9ca3af;
            cursor: pointer;
            font-size: 1rem;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            z-index: 1;
        }
        
        .password-toggle:hover {
            color: #2e7d32;
        }
        
        /* Button */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.875rem 1.5rem;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            border: none;
        }
        
        .btn-primary {
            background: #2e7d32;
            color: white;
        }
        
        .btn-primary:hover {
            background: #1b5e20;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(46, 125, 50, 0.3);
        }
        
        /* Alert Messages - Minimal */
        .alert {
            padding: 0.75rem 1rem;
            border-radius: 10px;
            margin-bottom: 1.5rem;
            font-size: 0.875rem;
            text-align: center;
        }
        
        .alert-danger {
            background: #fee2e2;
            border-left: 3px solid #dc2626;
            color: #991b1b;
        }
        
        .alert-success {
            background: #e6f4ea;
            border-left: 3px solid #2e7d32;
            color: #1b5e20;
        }
        
        .alert-info {
            background: #e0f2fe;
            border-left: 3px solid #0284c7;
            color: #075985;
        }
        
        /* Back Link */
        .back-link {
            text-align: center;
            margin-top: 1.5rem;
        }
        
        .back-link a {
            color: #6b7280;
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.2s;
        }
        
        .back-link a:hover {
            color: #2e7d32;
        }
        
        /* Responsive */
        @media (max-width: 968px) {
            .auth-container {
                grid-template-columns: 1fr;
            }
            
            .auth-illustration {
                display: none;
            }
            
            .auth-form {
                padding: 2rem;
            }
            
            .auth-form::before {
                display: none;
            }
            
            .auth-form-container {
                max-width: 100%;
            }
        }
        
        @media (max-width: 480px) {
            .auth-form {
                padding: 1.5rem;
            }
            
            .logo-image {
                width: 80px;
                height: 80px;
            }
            
            .logo-text {
                font-size: 1.2rem;
            }
            
            .form-control {
                padding: 0.75rem 3rem 0.75rem 2.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <!-- Illustration Side - Image Only -->
        <div class="auth-illustration">
            <img class="illustration-image" src="{{ url_for('static', filename='gettyimages-1481599576-612x612.jpg') }}" alt="Shifaa Herbal - Natural Healing">
        </div>
        
        <!-- Form Side -->
        <div class="auth-form">
            <div class="auth-form-container">
                <!-- Logo Section -->
                <div class="auth-form-logo">
                    <img class="logo-image" src="{{ url_for('static', filename='Screenshot 2026-04-01 150841.png') }}" alt="Shifaa Herbal Logo">
                    <div class="logo-text">Shifaa Herbal Remedies
                    </div>
                </div>
                
                <!-- Admin Badge -->
                <div class="admin-badge">
                    <i class="fas fa-user-shield"></i>
                    <span>Administrator Portal</span>
                </div>
                
                <!-- Flash Messages - Only errors, no welcome/logout messages -->
                {% with messages = get_flashed_messages(with_categories=true) %}
                    {% if messages %}
                        {% for category, message in messages %}
                            {% if category == 'danger' or category == 'error' %}
                                <div class="alert alert-{{ category }}">{{ message }}</div>
                            {% endif %}
                        {% endfor %}
                    {% endif %}
                {% endwith %}
                
                <form method="POST" action="{{ url_for('login') }}">
                    <div class="form-group">
                        <label for="email" class="form-label">Admin Email</label>
                        <div class="input-wrapper">
                            <i class="fas fa-envelope"></i>
                            <input type="email" class="form-control" id="email" name="email" 
                                   placeholder="admin@shifaaherbal.com" required autofocus>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="password" class="form-label">Admin Password</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock"></i>
                            <input type="password" class="form-control" id="password" name="password" 
                                   placeholder="Enter your password" required>
                            <button type="button" class="password-toggle" onclick="togglePassword('password')">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-sign-in-alt"></i>
                            Access Admin Dashboard
                        </button>
                    </div>
                </form>
                
                <div class="back-link">
                    <a href="{{ url_for('login') }}">
                        <i class="fas fa-arrow-left"></i> Client Portal
                    </a>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        function togglePassword(fieldId) {
            const field = document.getElementById(fieldId);
            const toggle = event.currentTarget;
            const type = field.getAttribute('type') === 'password' ? 'text' : 'password';
            field.setAttribute('type', type);
            toggle.innerHTML = type === 'password' ? '<i class="fas fa-eye"></i>' : '<i class="fas fa-eye-slash"></i>';
        }
    </script>
</body>
</html>
